name: iptv_player
description: "A professional IPTV Player built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  uuid: ^4.5.1
  http: ^1.3.0
  dio: ^5.7.0  # RESTORED: Critical for Xtream and Error Handling
  intl: ^0.19.0
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5

  # Video playback
  video_player: ^2.9.2
  chewie: ^1.8.5
  
  # Screen wake lock during playback
  wakelock_plus: ^1.2.9
  
  # Image caching and UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Persistence
  sqflite: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - icon/tv.png
    - icon/tv.svg
